services:
  - type: web
    name: smteamprojects-web
    runtime: node
    region: virginia
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run prisma:deploy && npm start
    healthCheckPath: /api/auth/session
    envVars:
      - key: NODE_VERSION
        value: 22.18.0
      - key: NODE_ENV
        value: production
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ADMIN_SEED_USERNAME
        value: admin_smteam
      - key: ADMIN_SEED_EMAIL
        value: admin@smteam.local
      - key: ADMIN_SEED_PASSWORD
        sync: false
