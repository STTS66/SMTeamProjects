services:
  - type: web
    name: smteamprojects-web
    runtime: node
    region: virginia
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build
    preDeployCommand: npm run prisma:deploy
    startCommand: npx next start -H 0.0.0.0 -p $PORT
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: 22.18.0
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: smteam-files
      - key: ADMIN_SEED_USERNAME
        value: admin_smteam
      - key: ADMIN_SEED_EMAIL
        value: admin@smteam.local
      - key: ADMIN_SEED_PASSWORD
        sync: false
